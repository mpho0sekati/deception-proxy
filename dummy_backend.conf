# Simple dummy backend configuration for nginx
events {
    worker_connections 1024;
}

http {
    server {
        listen 8081;
        
        location / {
            return 200 "200 OK - Dummy Backend Response\n";
        }
        
        location /api/v1/public-news {
            return 200 "200 OK - Public News API Response\n";
        }
        
        location /status {
            return 200 "200 OK - Backend Status\n";
        }
    }
}